task: type_coercion
version: 1
description: >
  检测并修复字段类型不一致问题：如存储为字符串的数值、混合日期格式等，
  将其强制转换为正确的数据类型，无法转换的记录打 "__flagged__" 标签。

data_source:
  type: parquet
  sample_size: 500

cleaning_strategy:
  type: type_coercion
  type_map: {}     # 空 = LLM 自动推断；手动示例: {age: int64, price: float64}

circuit_breaker:
  max_row_reduction: 0.05
  min_confidence_score: 0.75

metric_list:
  - metric: type_consistency_rate
    aggregation: mean
    higher_is_better: true
    weight: 0.60
  - metric: coercion_success_rate
    aggregation: mean
    higher_is_better: true
    weight: 0.40

output:
  format: parquet
  write_audit_log: true
  write_flagged_records: true

max_retries: 3
